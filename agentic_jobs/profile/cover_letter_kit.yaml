meta_guidance:
  goal: >
    Use this YAML as context to write cover letters that add new information beyond my resume.
    Do not restate my resume line by line. Instead, explain how my experiences map to the specific role,
    what kind of engineer I am, and why I care about the product and problem space.
  use_resume_like:
    - "Ground truth for dates, titles, and basic responsibilities."
    - "Source of hard facts, but not something to quote directly."
  avoid_in_cover_letter:
    - "Copying resume bullets or listing every tech stack used."
    - "Recounting my internships exactly as written in the resume."
    - "Reading like a formatted resume paragraph."

# ---------------------------------------------------------------------------
# Profile — parsed by _hydrate_profile()
# Keys read: bio, background (list), technical_strengths (dict of lists), work_style (list)
# ---------------------------------------------------------------------------
profile:
  bio: "Recent CS graduate (Chapman University) who builds reliable backend and data-heavy systems that real people actually use."
  background:
    - "CS major, Neuroscience minor — Chapman University, Dean's List"
    - "Software Engineering Intern at Johnson Controls (2023, return offer extended for 2024)"
    - "Software Engineer Intern at Meta University (2023, one of the few freshmen selected)"
    - "President, Girls Who Code at Chapman University — planned 30+ initiatives"
    - "President, Girls Who Code at Cupertino High School"
  technical_strengths:
    data_and_ai:
      - "RAG evaluation"
      - "cosine similarity scoring"
      - "chunking strategies"
      - "anomaly detection"
      - "HMM (Hidden Markov Models)"
      - "embeddings"
      - "multi-agent systems"
    backend_and_infra:
      - "FastAPI"
      - "asyncio"
      - "httpx"
      - "PostgreSQL"
      - "Docker"
      - "REST APIs"
      - "WebSockets"
      - "Alembic"
    languages:
      - "Python"
      - "Java"
      - "Swift"
      - "SQL"
      - "TypeScript"
  work_style:
    - "Break work into small reviewable pieces and ask clarifying questions early"
    - "Instrument what I build so future debugging is faster"
    - "Treat quality as a pipeline problem, not a model problem"
    - "Write short practical runbooks so others can operate what I build"
  identity_notes:
    - "I am early career, but I care about craft and about how users experience what I build."
    - "I am comfortable in messy, real world data and I like making things more observable and predictable."
  what_cover_letter_should_add:
    - "Why this particular company and product resonate with me."
    - "How I think about debugging, reliability, and user impact."
    - "How I like to work with other engineers, PMs, and non technical partners."
    - "What I want to learn on this team and how my existing habits will help."

# ---------------------------------------------------------------------------
# Skills card — parsed by _hydrate_skills()
# Keys: languages, backend, frontend, data_tools, ai_llm, dev_habits, cs_foundations
# ---------------------------------------------------------------------------
skills_card:
  languages: ["Python", "Java", "Swift", "SQL", "TypeScript"]
  backend: ["FastAPI", "REST APIs", "asyncio", "httpx", "PostgreSQL", "Docker", "WebSockets", "Alembic"]
  frontend: ["React", "Streamlit"]
  data_tools: ["PostgreSQL", "Power BI", "pandas", "numpy", "SHA-1 hashing", "pgvector", "Vector DB"]
  ai_llm: ["RAG pipelines", "LLM prompt engineering", "cosine similarity scoring", "embeddings", "chunking strategies", "multi-agent systems", "nomic-embed-text-v1.5"]
  dev_habits: ["CI/CD", "agile methodology", "SDLC", "logging and observability", "code review", "runbooks", "release management"]
  cs_foundations: ["data structures", "algorithms", "relational schema design", "HMM", "anomaly detection", "semantic search"]

interests_and_domains:
  core_interests:
    - "Backend engineering and data workflows that support real users."
    - "Evaluation and reliability for AI and LLM powered features."
    - "Productivity and workflow tools, especially things that live where people already work like Slack."
    - "Consumer experiences tied to fashion and discovery."
    - "Fitness and wellness products that help people change behavior."
  domain_mapping_examples:
    - "If the company is in search, knowledge, ads, or any high read system, lean on my RAG evaluation work and data quality mindset."
    - "If the company is in productivity, workflows, or internal tools, lean on my Slack based job copilot and reporting work."
    - "If the company is in health or fitness, lean on my fitness companion project and my genuine personal interest in training and nutrition."
    - "If the company is in mapping, robotics, or hardware linked systems, lean on my anomaly detection work on physical device signals."

work_style:
  how_i_work_day_to_day:
    - "I break work into small, reviewable pieces and ask clarifying questions early."
    - "I instrument what I build, so future debugging is faster and less guessy."
    - "I like to write short, practical notes or runbooks that explain how to use or operate a system."
    - "I am polite but direct in code review and I appreciate clear feedback in return."
  what_i_tend_to_do_without_being_told:
    - "Add basic request validation and error handling around new endpoints."
    - "Log enough context so production issues can be traced later."
    - "Check how a change will affect other teams or users, not just my own API or view."
    - "Clean up small papercuts I see in documentation or scripts while I am there."
  what_i_value_in_a_team:
    - "People who care about code quality, but also ship regularly."
    - "Mentors who explain the why behind design decisions, not just the what."
    - "Psychological safety to ask questions, admit confusion, and show half baked ideas."

technical_shape:
  high_level:
    description: >
      Use this section to understand what kinds of problems I have actually tackled,
      so you can argue convincingly that I can grow into similar systems even if the company stack differs.
    themes:
      - "Data quality and anomaly detection on real device data."
      - "Evaluation and iteration for RAG and LLM powered systems."
      - "Backend and workflow automation with Slack and HTTP APIs."
      - "Relational data modeling and correctness."
  do_not:
    - "List every tool in a cover letter."
    - "Pretend I am an expert in any tool I have only touched lightly."

# ---------------------------------------------------------------------------
# Experience highlights — parsed by _hydrate_experience()
# Keys per entry: key, title, summary, bullets (list), themes (list)
# IMPORTANT: bullets are the verified facts. Agents must not invent beyond these.
# This is the stable minimum floor. The Obsidian vault provides growing detail.
# ---------------------------------------------------------------------------
experience_highlights:
  - key: jci_rag_eval
    title: "RAG Evaluation Pipeline, Johnson Controls"
    summary: "Owned the evaluation pipeline for a customer-facing RAG chatbot. Replaced subjective spot-checks with reproducible cosine-similarity scoring on a fixed golden question set."
    bullets:
      - "Defined a representative golden question set with expected answer snippets as the evaluation baseline"
      - "Computed embeddings and cosine similarity scores to measure answer drift objectively after model or chunking changes"
      - "Ran chunking strategy experiments — fixed, semantic, and adaptive boundaries — and documented how each affected relevance and hallucination risk"
      - "Moved the team from feel-based spot reviews to repeatable, objective metrics"
      - "Research into chunking strategies and adaptive boundaries directly improved chatbot reliability"
    themes: ["rag", "evaluation", "data_quality", "ai", "llm", "search"]

  - key: jci_anomaly_detection
    title: "Anomaly Detection on Device Events, Johnson Controls"
    summary: "Explored anomaly detection on approximately three million minute-level events from Z-Wave smart home devices."
    bullets:
      - "Engineered time, frequency, and event-pattern features on ~3 million rows of device telemetry"
      - "Identified which anomalies mattered for customers vs. harmless noise through distribution and time-pattern analysis"
      - "Wrote a design note proposing an HMM-based approach with explicit tradeoffs vs. simpler threshold rules"
      - "Produced findings summaries leadership could follow without reading code or statistics papers"
    themes: ["data_engineering", "anomaly_detection", "streaming", "iot", "ml", "monitoring"]

  - key: jci_reporting
    title: "Data Quality and Reporting, Johnson Controls"
    summary: "Restored trust in leadership dashboards by fixing inconsistencies in device payload reporting logic rather than patching symptoms."
    bullets:
      - "Tracked down root causes in device payload inconsistencies — treated it as a data modeling problem, not just a display bug"
      - "Standardized a JSON-driven Power BI template so multiple teams could produce consistent dashboards without starting from scratch"
      - "Documented how the new templates worked and where they would need future maintenance"
    themes: ["data_quality", "reporting", "analytics", "bi", "internal_tools"]

  - key: agentic_job_copilot
    title: "Agentic Job Hunt Copilot (personal project, ongoing)"
    summary: "End-to-end autonomous job discovery platform. Async ingestion, Postgres backend, Slack-first UX, multi-agent cover letter generation, LLM-assisted ranking."
    bullets:
      - "Engineered an async ingestion pipeline using httpx and asyncio capable of processing over 500 jobs per minute"
      - "Implemented rate limiting, data deduplication via SHA-1 hashing, and clear data provenance across job sources"
      - "Used a Vector DB for semantic job matching and a RAG-based parsing engine to automate extraction of complex signals"
      - "Built a Slack-first UX: daily digests, one-click save, thread-based application tracking, interactive buttons"
      - "LLM used only for ranking hints and cover letter generation — core ingestion pipeline is deterministic and debuggable"
      - "Added multi-agent cover letter pipeline: ResearcherAgent, WriterAgent, HiringManagerAgent in a sequential write-review loop"
      - "Integrated Obsidian vault semantic retrieval (embeddings) and company web scraping for context-grounded cover letter drafts"
      - "Built a two-tier memory system: short-term per-application and long-term cross-application with 3-day auto-assess feedback condensing"
      - "Implemented prompt injection guardrails for all scraped web content and user notes before any LLM call"
    themes: ["automation", "backend", "data_pipelines", "slack", "llm", "rag", "agents", "productivity"]

  - key: meta_mood_app
    title: "iOS Mood App, Meta University"
    summary: "Mood-sensing iOS app built during Meta University internship. One of a small cohort of freshmen selected for the program."
    bullets:
      - "Built a multi-screen Swift app that sends text to an external sentiment API and suggests tailored activities based on the response"
      - "Added custom animations and transitions to make the experience feel cohesive and polished, not demo-like"
      - "Selected as one of the few freshmen in the Meta University cohort"
    themes: ["ios", "mobile", "consumer", "meta", "swift"]

# Human-readable narrative notes — NOT parsed by code, for reference only
experience_highlights_beyond_resume:
  jci_rag_eval:
    role_context: "RAG evaluation and chunking experiments for a customer facing chatbot at Johnson Controls."
    how_i_thought_about_it:
      - "The core problem was that people were saying the chatbot looked fine based on spot checks, which is hard to scale."
      - "I wanted a way to compare changes side by side on a fixed query set so we had an objective signal."
    what_i_actually_did:
      - "Defined a small but representative gold set of questions and expected answer snippets."
      - "Computed embeddings and cosine similarity scores so we could see how close answers stayed to the ground truth after a change."
      - "Experimented with different chunking strategies and recorded how they affected both relevance and hallucination risk."
    how_this_maps_to_other_roles:
      - "Anywhere there is an AI or search feature that people currently judge by feel, I can help move us toward measurable evaluation."
      - "I bring a habit of treating quality as a pipeline problem, not just a model problem."

  jci_anomaly_detection:
    role_context: "Anomaly detection exploration on roughly three million minute level events from Z Wave devices."
    how_i_thought_about_it:
      - "I did not trust raw metrics alone, so I started with distributions and time based patterns to see what looked off by eye."
      - "I tried to understand which anomalies truly mattered for customers versus which were just noisy but harmless."
    what_i_actually_did:
      - "Engineered basic features around time, frequency, and event patterns that could feed into models or rules."
      - "Wrote a short design note suggesting an HMM based approach and the tradeoffs compared to simpler thresholds."
      - "Summarized findings in a way leadership could follow without reading code or stats papers."
    how_this_maps_to_other_roles:
      - "Any system that streams events or metrics can benefit from the way I combine exploratory analysis with clear written recommendations."
      - "This is relevant to monitoring, alerting, fraud detection, abuse detection, and any reliability work."

  jci_reporting:
    role_context: "Data quality and reporting for home device data and leadership dashboards."
    how_i_thought_about_it:
      - "The bigger issue was trust. People had stopped trusting some dashboards because the numbers did not always line up."
      - "I treated this as both a data modeling problem and a communication problem."
    what_i_actually_did:
      - "Tracked down inconsistencies in device payloads and reporting logic rather than just patching symptoms."
      - "Standardized a JSON driven template for Power BI so multiple teams could produce similar dashboards without starting from scratch."
      - "Explained how the new templates worked and where they would need maintenance."
    how_this_maps_to_other_roles:
      - "Shows I care about correctness and repeatability in any metrics or analytics surface."
      - "Useful for internal tools, analytics platforms, or any team that surfaces numbers to decision makers."

  agentic_job_copilot:
    display_name: "Agentic Job Hunt Copilot, Slack based workflow"
    role_context: "Personal project to turn chaotic job search tabs into a structured, Slack first workflow."
    how_i_thought_about_it:
      - "I was tired of bouncing between Greenhouse, company sites, and tracking sheets."
      - "I wanted everything in one place where I already spend time, which is Slack."
    what_i_actually_did:
      - "Designed a backend that crawls job sources on a schedule, normalizes the data, and stores it in Postgres with clear provenance."
      - "Implemented a Slack experience where I get a digest of roles, can save interesting ones, and have application records created automatically."
      - "Used an LLM only for parsing and ranking hints, while keeping the core pipeline deterministic and debuggable."
      - "Instrumented the workflow with logging and basic error handling so when a source fails, I can tell why."
    how_this_maps_to_other_roles:
      - "Relevant for any company doing workflow automation, SaaS dashboards, or internal tools that integrate multiple APIs."
      - "Shows that I think about the full experience: ingestion, processing, and how it feels where users live."

  patient_records_app:
    display_name: "Patient Medical Records Application"
    role_context: "Course project that mimicked a small hospital record system with a Streamlit front end and SQL backend."
    how_i_thought_about_it:
      - "I wanted to design the data model so it would not paint us into a corner if we added more entities later."
      - "I tried to imagine how non technical staff would actually use the interface."
    what_i_actually_did:
      - "Designed a normalized schema with clear relationships between patients, doctors, appointments, and related data."
      - "Built Streamlit flows for common tasks and added basic validation so users could not easily put the database into a bad state."
      - "Used views, indexes, and careful query structure to keep common queries fast and safe."
    how_this_maps_to_other_roles:
      - "Good base for any product that manages structured entities and workflows, such as admin dashboards or CRUD heavy SaaS."

  meta_mood_app:
    display_name: "MetaU iOS Mood App"
    role_context: "Meta University project where I built a mood sensing app in Swift with an external sentiment API."
    how_i_thought_about_it:
      - "I wanted the app to feel playful and smooth, not like a bare bones demo."
      - "I paid attention to how animation and transitions affect how people perceive quality."
    what_i_actually_did:
      - "Built multiple screens that send text to an external sentiment API, interpret the response, and suggest tailored activities."
      - "Added custom animations and transitions to make the experience feel cohesive."
    how_this_maps_to_other_roles:
      - "Shows that I care about experience and polish, not only backend logic."
      - "Useful when applying to teams that value user experience even if I am mostly doing backend work."

projects_and_themes:
  slack_job_copilot:
    name: "Agentic Job Hunt Copilot"
    what_it_is: >
      Slack based job search orchestrator that ingests postings, ranks them, and manages applications inside Slack.
    why_it_matters:
      - "Good match for companies that integrate with Slack or build internal tools."
      - "Shows full stack thinking and comfort with async APIs, schedulers, and LLM assist."
    how_to_reference_it:
      - "Highlight how it unifies ingestion, ranking, and Slack UX with deterministic pipelines plus optional LLM hints."

projects:
  - key: "slack_job_copilot"
    name: "Agentic Job Hunt Copilot"
    short_name: "Slack job copilot"
    summary: >
      Slack based job search orchestrator that ingests postings, ranks them, and manages applications inside Slack with deterministic pipelines plus LLM hints.
    talking_points:
      - "Covers async ingestion, deterministic scoring, and a Slack-first UX."
      - "Ideal for workflow automation and internal tools teams."
    themes: ["automation", "productivity", "internal_tools", "slack", "backend", "llm"]

# ---------------------------------------------------------------------------
# Tone — parsed by _hydrate_tone()
# ---------------------------------------------------------------------------
tone:
  overall: ["Kind", "direct", "enthusiastic", "thoughtful", "grounded"]
  voice: ["First person", "Conversational but professional", "Short clear sentences"]
  dislikes:
    - "No em dashes"
    - "No semicolons"
    - "No over the top hype language"
    - "No stories from childhood or very early life"
  likes:
    - "Specific product mentions with one sharp observation."
    - "Reasoning like: this role is a fit because it combines X, Y, and Z from my background."
    - "Brief, concrete examples instead of vague adjectives."

# ---------------------------------------------------------------------------
# Dos and don'ts — parsed as flat lists by _build_kit()
# ---------------------------------------------------------------------------
dos:
  - "Open with why this specific company and product matter — one concrete, specific observation"
  - "Reference specific technologies and projects by name from the verified experience bullets"
  - "Use metrics and outcomes that actually appear in the experience bullets or vault excerpts"
  - "Sound like a confident engineer: short sentences, active voice"
  - "Connect experiences to JD themes explicitly: 'This is similar to X where I had to Y'"
  - "Let the candidate's authentic voice come through — direct, grounded, no corporate template feel"

donts:
  - "Do not invent metrics, percentages, or outcomes not present in the candidate data or vault excerpts"
  - "Do not reference AWS, GCP, Azure, Kubernetes, or any technology not in the skills_card or experience bullets"
  - "Do not use em dashes or semicolons"
  - "Do not copy resume bullets verbatim or list every tech stack used"
  - "Do not add experiences, companies, or projects not explicitly in the input data"

# ---------------------------------------------------------------------------
# Style examples — all sentences from the ServiceNow CL (gold-standard voice)
# parsed as a flat list by _build_kit()
# ---------------------------------------------------------------------------
style_examples:
  - "Agentic AI has come of age and now plays a critical role in the enterprise. I view this shift as the defining opportunity of my career."
  - "ServiceNow's mission to make the world work better resonates well with me because integrating AI to transform manual workflow makes it a reality."
  - "I want to build intelligent agents that automate business processes, and I have prepared for this by building autonomous systems, training models, and engineering RAG pipelines."
  - "I recently built an Agentic Job Hunt Copilot to function as an end-to-end autonomous jobs discovery platform."
  - "I engineered a pipeline using httpx and asyncio capable of ingesting over 500 jobs per minute while managing rate limits and data deduplication via SHA-1 hashing."
  - "By implementing a Vector DB for semantic matching and a RAG-based parsing engine, I successfully automated the extraction of complex signals to eliminate manual entry."
  - "At Johnson Controls, I recognized that deploying AI requires rigorous data quality."
  - "I owned the evaluation pipeline for a customer-facing RAG chatbot and replaced subjective reviews with reproducible metrics using cosine-similarity scoring."
  - "My research into chunking strategies and adaptive boundaries directly improved the reliability of the chatbot."
  - "This experience ensures I can deliver AI features that are enterprise-ready and trustworthy."
  - "While my recent focus is Agentic AI, my foundation rests on solid software engineering principles."
  - "Through my internships at Johnson Controls and Meta, as well as my academic work, I have developed proficiency in Python and Java."
  - "I understand the full SDLC process and have experience working in teams using CI/CD pipelines, agile methodology, and release management."
  - "I would love the opportunity to interview and be a part of the team."

reasoning_guidance:
  how_to_connect_me_to_a_job:
    - "Identify 3 to 5 core themes from the job description. For example: backend APIs, data pipelines, observability, internal tools, AI, safety, search, mapping, hardware integration."
    - "For each theme, pick one or two items from experience_highlights and explain how they relate."
    - "Use plain reasoning language such as: This is similar in spirit to what I did on X, where I had to Y."
  if_there_is_a_gap:
    - "Do not invent experience."
    - "Instead, say: I have done A and B, which are related in these ways, and I am excited to learn C."

# ---------------------------------------------------------------------------
# Structure — parsed by _hydrate_structure()
# Keys read: greeting, signoff (string), opener.guidance, impact_section.samples,
#            close.guidance
# ---------------------------------------------------------------------------
structure:
  greeting: "Dear Hiring Manager,"
  signoff: "Best regards,"
  opener:
    guidance: "2-3 sentences: why this company and role, tie to a specific project or mission. Never start with 'I am excited to apply.'"
  impact_section:
    label: "Impact highlights"
    samples:
      - "Owned the evaluation pipeline for a customer-facing RAG chatbot and replaced subjective reviews with reproducible metrics using cosine-similarity scoring"
      - "Engineered an async ingestion pipeline using httpx and asyncio capable of processing over 500 jobs per minute while managing rate limits and data deduplication via SHA-1 hashing"
      - "Restored trust in leadership dashboards by tracking down device payload inconsistencies rather than patching symptoms"
  close:
    guidance: "One or two sentences. Reaffirm genuine interest. Thank them for their time."
